system: Kodak
date_logged: 2026-06-20
outcome_known: true

growth_source: |
  Through 1990s-2000s: Film sales (Kodak color film)
  After 2005: Imaging (printers), Services, Government contracts
  Declining: Film revenue consistently down year-over-year

signal: |
  Operating margins collapsed from ~20% (2000) to <5% (2008)
  while revenue remained "stable" around $10B.

  Indicator: Heavy R&D spending on digital (imaging, printing)
  produced negligible revenue growth or margin expansion.

  By 2008: Despite ~$3B cumulative R&D in digital,
  digital imaging revenue was <10% of total.

  Pattern: Revenue flat/declining, but cost structure not adjusted.
  Margin squeeze via fixed-cost burden, not demand shock.

break_condition: |
  2012 bankruptcy.
  Last profitable year: 2007.
  By 2011: Quarterly losses routine.

confidence: high

contradictions: |
  Kodak WAS innovating (digital camera, inkjet).
  Kodak DID recognize the threat early.
  But capital allocation failed: R&D spend ≠ revenue scale.

  Common narrative: "Kodak ignored digital."
  Reality: Kodak invested heavily, but core business (film)
  was shrinking faster than new business (imaging) could scale.

what_would_disprove_this: |
  If signal quality remained healthy until shortly before bankruptcy,
  the False Acceleration hypothesis fails.

  Specifically: If margins stayed above 10% through 2010,
  or if film revenue decline was offset by imaging growth,
  the acceleration story would hold.

signal_action_alignment: medium

investigation_challenge_3: |
  "Maybe the real problem was timing, not signal decay"

  Evidence examined (1995-2005):

  SIGNAL VISIBILITY:
  - 1975: Kodak invented digital camera
  - 1990: 70% of profits from film (known vulnerability)
  - 1993: CEO Fisher commits $2B+ to digital R&D
  - 2000: Stock down 39%, digital threat tracking ongoing
  - 2001: Film demand clearly declining
  - 2005: Strategy shift: "Digital revenue to exceed traditional"

  ACTION ALIGNMENT:
  - 1997: Lost $440M on digital initiatives
  - Early 1990s: Digital efforts "half-hearted, poorly executed"
  - 2001: Losing $60 per digital camera sold
  - 2000s: Middle management still film-centric (resisted pivot)
  - Digital market share: 27% (1999) → 15% (2003) → 7% (2010)

  CRITICAL FINDING:
  Kodak SAW the threat (signal was visible).
  Kodak INVESTED in response (CEO committed capital).
  But organizational execution FAILED (middle mgmt resistance).
  And timing was LATE (by the time digital scaled, margins already collapsing).

  This is NOT False Acceleration on Kodak's part.
  This is a different failure mode:
  Signal Visible ≠ Organizational Capability to Execute

  IMPLICATION FOR Ω:
  Ω can detect margin decay (it does).
  Ω may NOT detect organizational paralysis.
  A system can have both:
  - Visible warning signs (σ declining)
  - AND paralysis in response (action ≠ signal)

  Kodak data suggests Ω measures only one failure mode.
  This discovery NARROWS the framework's scope
  but CLARIFIES what it actually detects.
